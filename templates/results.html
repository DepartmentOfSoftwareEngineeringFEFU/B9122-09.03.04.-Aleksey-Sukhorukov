{% extends "base.html" %}

{% block title %}Результаты моделирования и анализ трафика – ИСМДС{% endblock %}

{% block content %}
<h3>Результаты моделирования и анализ трафика</h3>
<div id="statusMessage"></div>

<div class="row">
    <!-- Левая колонка: выбор данных -->
    <div class="col-md-3">
        <div class="card mb-3">
            <div class="card-header">Выбор данных</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Тип данных</label>
                        <select class="form-select" id="dataTypeSelect">
                            <option value="retro" selected>
                                Ретроспективные
                            </option>

                            <option value="simulation">
                                 Смоделированные
                            </option>
                        </select>

                </div>
                <div class="mb-3">
                    <select class="form-select" id="sessionSelect"></select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Отображаемые слои</label>
                    <div class="mb-3">
                        <label class="form-label">Временной интервал</label>

                        <select class="form-select" id="timeWindow">
                            <option value="all" selected>Весь период</option>
                            <option value="1">Первый час</option>
                            <option value="3">Первые 3 часа</option>
                            <option value="6">Первые 6 часов</option>
                        </select>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="layerTracks" checked>
                        <label class="form-check-label" for="layerTracks">
                            Траектории судов
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input"
                               type="checkbox"
                               id="layerHeat"
                               checked>

                        <label class="form-check-label" for="layerHeat">
                            Тепловая карта
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="showAnomalies" checked>
                        <label class="form-check-label" for="showAnomalies">
                            Показывать аномалии
                        </label>
                    </div>
                </div>

                <button class="btn btn-primary w-100 mb-2" id="showTracks" type="button">
                    Обновить карту
                </button>
            </div>
        </div>
    </div>

    <!-- Правая колонка: карта -->
    <div class="col-md-9">
        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
    <span>Карта движения судов</span>
    <small id="clusterStats" class="text-muted">
        Кластеры: — | Аномалии: —
    </small>
</div>
            <div class="card-body" style="height: 480px;">
                <div id="map" style="width: 100%; height: 100%;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
    <!-- Leaflet CSS/JS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <script>


function showMessage(text, type="warning") {

    const container =
        document.getElementById("statusMessage");

    container.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show">
            ${text}
            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert">
            </button>
        </div>
    `;

}


        const sessions = [
            {% for s in sessions %}
        {
        id: {{ s.id }},
        name: "Сессия {{ s.id }} ({{ s.original_filename }})"
        },
            {% endfor %}
        ];

        const runs = [
        {% for r in runs %}
        {
        id: {{ r.id }},
        name: "Запуск {{ r.id }} ({{ r.scenario.name }})"
        },
        {% endfor %}
        ];


        // Инициализация карты без стандартного блока атрибуции
        const map = L.map('map', {
            attributionControl: false
        }).setView([59.9, 30.3], 8);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: ''
        }).addTo(map);


        const tracksLayer = L.layerGroup().addTo(map);
        const heatLayer = L.layerGroup().addTo(map);


        const geometryLayer =
            L.layerGroup().addTo(map);

        fetch("/api/geometry")
            .then(response => response.json())
            .then(data => {

                L.geoJSON(data, {

                    style: {
                        color: "#444",
                        weight: 1,
                        fillColor: "#888",
                        fillOpacity: 0.5
                    }

                }).addTo(geometryLayer);

            })
            .catch(err => {
                console.error(
                    "Ошибка загрузки GeoJSON:",
                    err
                );
            });

        const portIcon = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
        iconSize: [26, 26],
        iconAnchor: [13, 26],
        popupAnchor: [0, -24]
        });

        L.marker([43.105,131.90], {
        icon: portIcon
        })
        .addTo(map)
        .bindPopup("<b>Порт Владивосток</b>");

        fetch("/api/geometry")
            .then(response => response.json())
            .then(data => {

                data.land.forEach(poly => {

                    L.polygon(poly, {

                        color: "#1f5f1f",
                        fillColor: "#5fb85f",
                        fillOpacity: 0.65,
                        weight: 2

                    }).addTo(geometryLayer);

                });

            })
            .catch(err => {
                console.error("Ошибка загрузки геометрии:", err);
            });

        const colors = [
            '#1f77b4', '#ff7f0e', '#2ca02c', '#d62728',
            '#9467bd', '#8c564b', '#e377c2', '#7f7f7f',
            '#bcbd22', '#17becf'
        ];

        document.getElementById('showTracks').addEventListener('click', function () {
            const sessionSelect = document.getElementById('sessionSelect');
            const sessionId = sessionSelect.value;

            if (!sessionId) {
                showMessage('Выберите сессию загрузки.');
                return;
            }

            const type =
    document.getElementById("dataTypeSelect").value;

const url =
    type==="retro"
    ? "/api/session/"+sessionId+"/tracks"
    : "/api/run/"+sessionId+"/tracks";

fetch(url)
    .then(response => response.json())
    .then(data => {

        if (data.warning) {
            showMessage(data.warning);
        }

        let clusterInfo = {};

        const clusterPromise =
            type === "retro"
                ? fetch("/api/clusters/" + sessionId)
                    .then(response => response.json())
                : Promise.resolve({
                    clusters: [],
                    cluster_count: 0,
                    anomaly_count: 0
                });

        clusterPromise.then(clusterData => {

            console.log("Кластеры:", clusterData);

            clusterData.clusters.forEach(item => {
                clusterInfo[item.vessel_number] = item;
            });

            heatLayer.clearLayers();

            if (
                type === "retro" &&
                document.getElementById("layerHeat").checked
            ) {

                const windowValue =
                    document.getElementById("timeWindow").value;

                fetch(
                    "/api/session/" +
                    sessionId +
                    "/traffic?window=" +
                    windowValue
                )
                    .then(response => response.json())
                    .then(trafficData => {

                        const heatPoints = trafficData.grid.map(cell => [
                            cell.lat,
                            cell.lon,
                            cell.count
                        ]);

                        L.heatLayer(heatPoints, {
                            radius: 35,
                            blur: 25,
                            maxZoom: 16
                        }).addTo(heatLayer);

                    });

            }

            document.getElementById("clusterStats").textContent =
            "Кластеры: " +
            clusterData.cluster_count +
            " | Аномалии: " +
            clusterData.anomaly_count;

            tracksLayer.clearLayers();

            if (data.error) {
                showMessage(data.error);
                return;
            }

            if (!data.tracks) {
                showMessage("Нет данных для отображения.");
                return;
            }

            let firstPoint = null;
            const tracks = data.tracks;
            const vesselIds = Object.keys(tracks);

            vesselIds.forEach(function (vesselNumber, idx) {

                const points = tracks[vesselNumber];

                if (!points || points.length === 0) {
                    return;
                }

                const latlngs = points.map(p => [p.lat, p.lon]);

                if (!firstPoint) {
                    firstPoint = latlngs[0];
                }

                const info = clusterInfo[vesselNumber];

                const showAnomalies =
                    document.getElementById("showAnomalies").checked;

                if (info && info.is_anomaly && !showAnomalies) {
                    return;
                }

                let color;

                if (info && info.is_anomaly) {
                    color = "#ff0000";
                } else if (info) {
                    color = colors[info.cluster % colors.length];
                } else {
                    color = colors[idx % colors.length];
                }

                let popup = "Судно " + vesselNumber;

                if (info) {
                    popup += "<br>Кластер: " + info.cluster;

                    if (info.is_anomaly) {
                        popup += "<br><b>Аномалия</b>";
                    }
                }

                L.polyline(latlngs, {
                    color: color,
                    weight: 2
                })
                .bindPopup(popup)
                .addTo(tracksLayer);

            });

            if (firstPoint) {
                map.setView(firstPoint, 9);
            } else {
                showMessage("Для выбранной сессии не найдено точек траекторий.");
            }

        }).catch(err => {
            console.error("Ошибка получения кластеров:", err);
        });

    })
    .catch(err => {
        console.error(err);
        showMessage("Ошибка при загрузке данных траекторий.");
    });
        });

        function updateSelect(){

    const type =
        document.getElementById("dataTypeSelect").value;

    const select =
        document.getElementById("sessionSelect");

    select.innerHTML = "";

    const source =
        type === "retro"
        ? sessions
        : runs;

    source.forEach(item=>{

        const option =
            document.createElement("option");

        option.value = item.id;
        option.textContent = item.name;

        select.appendChild(option);

    });

}

updateSelect();

document
.getElementById("dataTypeSelect")
.addEventListener("change", updateSelect);
    </script>
{% endblock %}
